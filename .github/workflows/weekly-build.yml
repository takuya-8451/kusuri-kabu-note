name: Weekly Site Build

on:
  schedule:
    - cron: '0 23 * * 0'  # 毎週日曜23:00 UTC = 月曜08:00 JST
  workflow_dispatch:       # GitHub管理画面から手動実行も可能

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: サイトをビルド
        run: npm run build

      - name: ビルド成功を記録
        run: echo "ビルド完了：$(date '+%Y-%m-%d %H:%M:%S UTC')"
