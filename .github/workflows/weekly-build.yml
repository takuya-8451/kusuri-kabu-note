name: Weekly Build & Data Freshness

on:
  schedule:
    - cron: '0 23 * * 0'  # 毎週日曜23:00 UTC = 月曜08:00 JST
  workflow_dispatch:       # GitHub管理画面から手動実行も可能

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js 22 をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: サイトをビルド（CIサニティチェック）
        run: npm run build

  data-freshness:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js 22 をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: データ鮮度をチェック（値の自動上書きはしない）
        run: node scripts/check-data-freshness.mjs

      - name: レポートを単一のGitHub Issueへ集約
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="📊 データ鮮度レポート"
          NUM=$(gh issue list --search "$TITLE in:title" --state open --json number,title \
            --jq ".[] | select(.title==\"$TITLE\") | .number" | head -n1)
          if [ -n "$NUM" ]; then
            gh issue edit "$NUM" --body-file data-freshness-report.md
            echo "既存Issue #$NUM を更新しました"
          else
            gh issue create --title "$TITLE" --body-file data-freshness-report.md
            echo "Issueを新規作成しました"
          fi
